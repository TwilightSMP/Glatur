name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 9.4.1

      - name: Resolve automatic release metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail
          mod_version="$(grep -E '^mod_version=' gradle.properties | cut -d '=' -f2)"
          minecraft_version="$(grep -E '^minecraft_version=' gradle.properties | cut -d '=' -f2)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          auto_tag="v${mod_version}-mc${minecraft_version}-build.${GITHUB_RUN_NUMBER}.r${GITHUB_RUN_ATTEMPT}"

          echo "tag=${auto_tag}" >> "$GITHUB_OUTPUT"
          echo "mod_version=${mod_version}" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=${minecraft_version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag already exists on origin: ${tag}"
            exit 1
          fi

          git tag -a "$tag" -m "Auto release $tag"
          git push origin "$tag"

      - name: Build release artifacts
        run: gradle --no-daemon build

      - name: Verify versioned jars exist
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          jars=(build/libs/*-mc${{ steps.version.outputs.minecraft_version }}-${{ steps.version.outputs.mod_version }}*.jar)
          if [ ${#jars[@]} -eq 0 ]; then
            echo "No versioned jars found for v${{ steps.version.outputs.mod_version }}-mc${{ steps.version.outputs.minecraft_version }}"
            ls -la build/libs || true
            exit 1
          fi
          printf 'Matched jars:\n%s\n' "${jars[*]}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: glatur-release-${{ steps.version.outputs.mod_version }}-mc${{ steps.version.outputs.minecraft_version }}
          path: |
            build/libs/*-mc${{ steps.version.outputs.minecraft_version }}-${{ steps.version.outputs.mod_version }}*.jar
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Glatur Auto v${{ steps.version.outputs.mod_version }} (MC ${{ steps.version.outputs.minecraft_version }}) #${{ github.run_number }}
          generate_release_notes: true
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            build/libs/*-mc${{ steps.version.outputs.minecraft_version }}-${{ steps.version.outputs.mod_version }}*.jar
