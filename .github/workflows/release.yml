name: Release

on:
  push:
    tags:
      - 'v*-mc*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Recognize and validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-mc([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Invalid tag format: $tag"
            echo "Expected format: v<mod_version>-mc<minecraft_version>"
            echo "Example: v1.0.0-mc1.20.1"
            exit 1
          fi

          tag_mod_version="${BASH_REMATCH[1]}"
          tag_minecraft_version="${BASH_REMATCH[2]}"

          file_mod_version="$(grep -E '^mod_version=' gradle.properties | cut -d '=' -f2)"
          file_minecraft_version="$(grep -E '^minecraft_version=' gradle.properties | cut -d '=' -f2)"

          if [[ "$tag_mod_version" != "$file_mod_version" ]]; then
            echo "mod_version mismatch: tag=$tag_mod_version gradle.properties=$file_mod_version"
            exit 1
          fi

          if [[ "$tag_minecraft_version" != "$file_minecraft_version" ]]; then
            echo "minecraft_version mismatch: tag=$tag_minecraft_version gradle.properties=$file_minecraft_version"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "mod_version=$tag_mod_version" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=$tag_minecraft_version" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: gradle build

      - name: Verify versioned jars exist
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          jars=(build/libs/*-mc${{ steps.version.outputs.minecraft_version }}-${{ steps.version.outputs.mod_version }}*.jar)
          if [ ${#jars[@]} -eq 0 ]; then
            echo "No versioned jars found for v${{ steps.version.outputs.mod_version }}-mc${{ steps.version.outputs.minecraft_version }}"
            ls -la build/libs || true
            exit 1
          fi
          printf 'Matched jars:\n%s\n' "${jars[*]}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glatur-release-${{ steps.version.outputs.mod_version }}-mc${{ steps.version.outputs.minecraft_version }}
          path: |
            build/libs/*-mc${{ steps.version.outputs.minecraft_version }}-${{ steps.version.outputs.mod_version }}*.jar
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Glatur v${{ steps.version.outputs.mod_version }} (MC ${{ steps.version.outputs.minecraft_version }})
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            build/libs/*-mc${{ steps.version.outputs.minecraft_version }}-${{ steps.version.outputs.mod_version }}*.jar
